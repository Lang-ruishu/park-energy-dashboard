<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园智慧运维可视化大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(52, 211, 153, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .header {
            position: relative;
            z-index: 1;
            padding: 20px 30px;
            background: linear-gradient(90deg, rgba(52, 211, 153, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            border-bottom: 2px solid rgba(52, 211, 153, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(90deg, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-info {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .header-time {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }
        .header-date {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* 顶部数据卡片 */
        .stats-row {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            padding: 20px 30px;
        }
        .stat-card {
            background: rgba(13, 27, 42, 0.8);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(52, 211, 153, 0.5);
            box-shadow: 0 5px 20px rgba(52, 211, 153, 0.2);
        }
        .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .stat-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(90deg, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-unit {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
        }
        
        /* 主内容区域 */
        .main-content {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 20px;
            padding: 0 30px 30px;
            height: calc(100vh - 180px);
        }
        
        .panel {
            background: rgba(13, 27, 42, 0.8);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }
        .panel-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(52, 211, 153, 0.15) 0%, transparent 100%);
            border-bottom: 1px solid rgba(52, 211, 153, 0.1);
        }
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #34d399;
        }
        .panel-body {
            padding: 15px;
            height: calc(100% - 50px);
        }
        
        .chart-container {
            height: 100%;
        }
        
        /* 3D模型容器 */
        #model-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: radial-gradient(ellipse at center, rgba(52, 211, 153, 0.1) 0%, rgba(13, 27, 42, 0.9) 70%);
        }
        #model-canvas {
            width: 100%;
            height: 100%;
        }
        .model-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 15px;
            border-radius: 20px;
        }
        .model-title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: 600;
            color: #34d399;
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 27, 42, 0.9);
            z-index: 10;
        }
        .loading-text {
            font-size: 16px;
            color: #34d399;
        }
        
        /* 设备告警表格 */
        .alert-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .alert-table th {
            padding: 12px 10px;
            text-align: left;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            border-bottom: 1px solid rgba(52, 211, 153, 0.2);
            background: rgba(52, 211, 153, 0.05);
        }
        .alert-table td {
            padding: 10px;
            color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(52, 211, 153, 0.1);
        }
        .alert-table tr:hover {
            background: rgba(52, 211, 153, 0.05);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-normal {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }
        .status-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        .status-error {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }
        
        .table-scroll {
            height: 100%;
            overflow-y: auto;
        }
        .table-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: rgba(52, 211, 153, 0.1);
            border-radius: 3px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: rgba(52, 211, 153, 0.3);
            border-radius: 3px;
        }
        
        /* 左右侧布局 */
        .side-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .side-panel {
            flex: 1;
        }
        
        @media (max-width: 1400px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .main-content { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .main-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏫 校园智慧运维可视化大屏</h1>
        <div class="header-info">
            <div class="header-time" id="current-time">--:--:--</div>
            <div class="header-date" id="current-date">----年--月--日</div>
        </div>
    </div>

    <!-- 顶部数据卡片 -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon">⚡</div>
            <div class="stat-title">当日总用电量</div>
            <div class="stat-value" id="stat-electricity">--</div>
            <div class="stat-unit">kWh</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📚</div>
            <div class="stat-title">教室综合使用率</div>
            <div class="stat-value" id="stat-classroom">--</div>
            <div class="stat-unit">%</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🌡️</div>
            <div class="stat-title">校园平均温度</div>
            <div class="stat-value" id="stat-temp">--</div>
            <div class="stat-unit">°C</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💧</div>
            <div class="stat-title">校园平均湿度</div>
            <div class="stat-value" id="stat-humidity">--</div>
            <div class="stat-unit">%</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📡</div>
            <div class="stat-title">正常在线设备</div>
            <div class="stat-value" id="stat-devices">--</div>
            <div class="stat-unit">台</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⚠️</div>
            <div class="stat-title">当日告警数量</div>
            <div class="stat-value" id="stat-alerts">--</div>
            <div class="stat-unit">条</div>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 左侧 -->
        <div class="side-column">
            <div class="panel side-panel">
                <div class="panel-header">
                    <span class="panel-title">📈 分时段教室使用率</span>
                </div>
                <div class="panel-body">
                    <div class="chart-container" id="classroom-chart"></div>
                </div>
            </div>
            <div class="panel side-panel">
                <div class="panel-header">
                    <span class="panel-title">🌿 校园环境质量分析</span>
                </div>
                <div class="panel-body">
                    <div class="chart-container" id="environment-chart"></div>
                </div>
            </div>
            <div class="panel side-panel">
                <div class="panel-header">
                    <span class="panel-title">📊 设备状态统计</span>
                </div>
                <div class="panel-body">
                    <div class="chart-container" id="device-stats-chart"></div>
                </div>
            </div>
        </div>

        <!-- 中间 - 3D模型 -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">🏢 校园3D模型展示</span>
            </div>
            <div class="panel-body" style="padding: 0;">
                <div id="model-container">
                    <div class="loading-overlay" id="loading">
                        <span class="loading-text">模型加载中...</span>
                    </div>
                    <div class="model-title">校园全景模型</div>
                    <canvas id="model-canvas"></canvas>
                    <div class="model-hint">🖱️ 拖拽旋转 | 滚轮缩放</div>
                </div>
            </div>
        </div>

        <!-- 右侧 -->
        <div class="side-column">
            <div class="panel side-panel">
                <div class="panel-header">
                    <span class="panel-title">🏢 各楼栋活跃度排行</span>
                </div>
                <div class="panel-body">
                    <div class="chart-container" id="building-chart"></div>
                </div>
            </div>
            <div class="panel side-panel">
                <div class="panel-header">
                    <span class="panel-title">🔧 校园设备告警清单</span>
                </div>
                <div class="panel-body">
                    <div class="table-scroll">
                        <table class="alert-table">
                            <thead>
                                <tr>
                                    <th>设备</th>
                                    <th>状态</th>
                                    <th>说明</th>
                                </tr>
                            </thead>
                            <tbody id="alert-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fetchData(url, callback) {
            fetch(url).then(r => r.json()).then(callback).catch(e => console.error('Error:', e));
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN');
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', {year: 'numeric', month: 'long', day: 'numeric'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 初始化总览数据
        function initOverview() {
            fetchData('/api/overview', (data) => {
                document.getElementById('stat-electricity').textContent = data.total_electricity.toFixed(0);
                document.getElementById('stat-classroom').textContent = data.classroom_usage_rate.toFixed(1);
                document.getElementById('stat-temp').textContent = data.avg_temperature.toFixed(1);
                document.getElementById('stat-humidity').textContent = data.avg_humidity.toFixed(1);
                document.getElementById('stat-devices').textContent = data.online_devices;
                document.getElementById('stat-alerts').textContent = data.alert_count;
            });
        }

        // 教室使用率折线图
        function initClassroomChart() {
            fetchData('/api/classroom_usage', (data) => {
                const chart = echarts.init(document.getElementById('classroom-chart'));
                chart.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: '5%', right: '5%', bottom: '15%', top: '10%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: data.time_slots,
                        axisLabel: { color: '#999', rotate: 30, fontSize: 10 },
                        axisLine: { lineStyle: { color: 'rgba(52, 211, 153, 0.3)' } }
                    },
                    yAxis: {
                        type: 'value',
                        max: 100,
                        axisLabel: { color: '#999', formatter: '{value}%' },
                        splitLine: { lineStyle: { color: 'rgba(52, 211, 153, 0.1)' } }
                    },
                    series: [{
                        name: '使用率',
                        type: 'line',
                        smooth: true,
                        data: data.usage_rates,
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(52, 211, 153, 0.4)' },
                                { offset: 1, color: 'rgba(52, 211, 153, 0.05)' }
                            ])
                        },
                        lineStyle: { color: '#34d399', width: 2 },
                        itemStyle: { color: '#34d399' }
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            });
        }

        // 环境质量饼图
        function initEnvironmentChart() {
            fetchData('/api/environment_quality', (data) => {
                const chart = echarts.init(document.getElementById('environment-chart'));
                const colorMap = { '优': '#34d399', '良': '#3b82f6', '差': '#f87171' };
                chart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c}个 ({d}%)' },
                    legend: {
                        orient: 'vertical',
                        right: '5%',
                        top: 'center',
                        textStyle: { color: '#999' },
                        itemWidth: 10,
                        itemHeight: 10
                    },
                    series: [{
                        type: 'pie',
                        radius: ['35%', '60%'],
                        center: ['40%', '50%'],
                        avoidLabelOverlap: false,
                        label: { show: false },
                        emphasis: { label: { show: true, fontSize: 12, fontWeight: 'bold' } },
                        labelLine: { show: false },
                        data: data.levels.map((level, i) => ({
                            value: data.counts[i],
                            name: level,
                            itemStyle: { color: colorMap[level] }
                        }))
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            });
        }

        // 楼栋活跃度柱状图
        function initBuildingChart() {
            fetchData('/api/building_activity', (data) => {
                const chart = echarts.init(document.getElementById('building-chart'));
                chart.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '5%', right: '5%', bottom: '15%', top: '10%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: data.buildings,
                        axisLabel: { color: '#999', rotate: 30, fontSize: 10 },
                        axisLine: { lineStyle: { color: 'rgba(52, 211, 153, 0.3)' } }
                    },
                    yAxis: {
                        type: 'value',
                        axisLabel: { color: '#999', formatter: '{value}' },
                        splitLine: { lineStyle: { color: 'rgba(52, 211, 153, 0.1)' } }
                    },
                    series: [{
                        name: '活跃人次',
                        type: 'bar',
                        data: data.activity_counts,
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#34d399' },
                                { offset: 1, color: '#3b82f6' }
                            ]),
                            borderRadius: [4, 4, 0, 0]
                        },
                        barWidth: '50%'
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            });
        }

        // 设备状态统计图
        function initDeviceStatsChart() {
            fetchData('/api/device_stats', (data) => {
                const chart = echarts.init(document.getElementById('device-stats-chart'));
                chart.setOption({
                    tooltip: { trigger: 'item' },
                    series: [{
                        type: 'pie',
                        radius: ['25%', '50%'],
                        center: ['50%', '50%'],
                        data: [
                            { value: data['正常'], name: '正常', itemStyle: { color: '#34d399' } },
                            { value: data['预警'], name: '预警', itemStyle: { color: '#fbbf24' } },
                            { value: data['故障'], name: '故障', itemStyle: { color: '#f87171' } }
                        ],
                        label: {
                            show: true,
                            formatter: '{b}\n{c}台',
                            color: '#fff',
                            fontSize: 11
                        },
                        emphasis: { label: { fontSize: 12, fontWeight: 'bold' } }
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            });
        }

        // 设备告警表格
        function initAlertTable() {
            fetchData('/api/device_alerts', (data) => {
                const tbody = document.getElementById('alert-table-body');
                tbody.innerHTML = '';
                
                data.alerts.forEach(alert => {
                    const statusClass = alert.status === '正常' ? 'status-normal' : 
                                       alert.status === '预警' ? 'status-warning' : 'status-error';
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${alert.device_name}</td>
                        <td><span class="status-badge ${statusClass}">${alert.status}</span></td>
                        <td>${alert.alert_message}</td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

        // Three.js 3D模型加载
        async function init3DModel() {
            const container = document.getElementById('model-container');
            const canvas = document.getElementById('model-canvas');
            
            // 动态导入Three.js模块
            const THREE = await import('three');
            const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');
            const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
            
            // 场景设置
            const scene = new THREE.Scene();
            
            // 相机设置
            const camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(5, 5, 5);
            
            // 渲染器设置
            const renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                alpha: true
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            
            // 控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 20;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;
            
            // 光照设置
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // 添加辅助网格
            const gridHelper = new THREE.GridHelper(10, 20, 0x34d399, 0x1b263b);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);
            
            // 加载GLB模型
            const loader = new GLTFLoader();
            loader.load(
                '/校园模型.glb',
                (gltf) => {
                    const model = gltf.scene;
                    
                    // 自动调整模型大小和位置
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 3 / maxDim;
                    model.scale.setScalar(scale);
                    
                    model.position.x = -center.x * scale;
                    model.position.y = -center.y * scale + 0.5;
                    model.position.z = -center.z * scale;
                    
                    scene.add(model);
                    document.getElementById('loading').style.display = 'none';
                    console.log('模型加载成功');
                },
                (progress) => {
                    console.log('加载进度:', (progress.loaded / progress.total * 100) + '%');
                },
                (error) => {
                    console.error('模型加载错误:', error);
                    document.getElementById('loading').querySelector('.loading-text').textContent = '模型加载失败';
                }
            );
            
            // 动画循环
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
            
            // 窗口大小调整
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initOverview();
            initClassroomChart();
            initEnvironmentChart();
            initBuildingChart();
            initDeviceStatsChart();
            initAlertTable();
            init3DModel();
            
            // 每30秒刷新数据
            setInterval(() => {
                initOverview();
                initAlertTable();
            }, 30000);
        });
    </script>
</body>
</html>
