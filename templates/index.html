<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园智慧运维可视化大屏</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-liquidfill@3.1.0/dist/echarts-liquidfill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: transparent;
            min-height: 100vh;
            color: #e9ecef;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }
        .header {
            position: relative;
            z-index: 3;
            padding: 0;
            background: rgba(10, 20, 40, 0.95);
            border-bottom: 1px solid rgba(50, 70, 110, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 48px;
            font-weight: 600;
            font-family: 'YouYuan', 'Microsoft YaHei', 'SimHei', sans-serif;
            color: #ffffff;
            text-align: center;
            width: 100%;
            padding: 25px 60px;
            border-radius: 0;
        }
        .header-info {
            display: none;
        }
        .header-time {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
        }
        .header-date {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* 顶部数据卡片 */
        .stats-row {
            position: relative;
            z-index: 3;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            padding: 15px 20px;
            background: rgba(80, 80, 80, 0.4);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(100, 100, 100, 0.3);
        }
        .stat-card {
            background: rgba(128, 110, 95, 0.75);
            border: 1px solid rgba(150, 130, 110, 0.6);
            border-radius: 12px;
            padding: 15px 12px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(160, 140, 120, 0.7);
            background: rgba(100, 85, 70, 0.9);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .stat-icon {
            font-size: 36px;
            margin-bottom: 8px;
            color: #e0e0e0;
        }
        .stat-card:hover .stat-icon {
            color: #fff;
        }
        .stat-title {
            font-size: 18px;
            color: #b0b0b0;
            margin-bottom: 6px;
        }
        .stat-card:hover .stat-title {
            color: #fff;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }
        .stat-card:hover .stat-value {
            color: #fff;
        }
        .stat-unit {
            font-size: 18px;
            color: #909090;
            margin-top: 4px;
        }
        .stat-card:hover .stat-unit {
            color: #ccc;
        }
        
        /* 主内容区域 */
        .main-content {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1.3fr 1fr;
            gap: 15px;
            padding: 0 20px 20px;
            height: calc(100vh - 160px);
        }
        
        .panel {
            background: rgba(10, 15, 20, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .panel-header {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        .panel-body {
            padding: 12px;
            height: calc(100% - 40px);
        }
        
        .chart-container {
            height: 100%;
        }
        
        /* 3D模型容器 - 全屏背景 */
        #model-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        #model-canvas {
            width: 100%;
            height: 100%;
        }
        
        /* 主内容区域 - 参考图片排版 */
        .main-content {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            grid-template-rows: 1fr 3fr 2fr;
            grid-template-areas:
                "top-left top-center top-right"
                "left center right"
                "bottom-left bottom-center bottom-right";
            gap: 10px;
            padding: 10px;
            height: calc(100vh - 160px);
        }
        
        /* 顶部行 */
        .top-left { grid-area: top-left; }
        .top-center { grid-area: top-center; }
        .top-right { grid-area: top-right; }
        
        /* 中间行 */
        .left-column { grid-area: left; }
        .center-area { grid-area: center; }
        .right-column { grid-area: right; }
        
        /* 底部行 */
        .bottom-left { grid-area: bottom-left; }
        .bottom-center { grid-area: bottom-center; }
        .bottom-right { grid-area: bottom-right; }
        
        /* 中央区域 - 完全透明，让3D沙盘完整显示 */
        .center-area {
            grid-area: center;
            position: relative;
            cursor: grab;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            background: transparent;
        }
        .center-area:active {
            cursor: grabbing;
        }
        .center-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(10, 15, 20, 0.6);
            padding: 6px 15px;
            border-radius: 20px;
            z-index: 20;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 右侧栏 */
        .right-column {
            grid-area: right;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* 底部区域 */
        .bottom-area {
            grid-area: bottom;
            display: flex;
            gap: 10px;
        }
        .bottom-panel {
            flex: 1;
        }
        
        /* 左右侧边栏 */
        .side-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* 设备告警表格 */
        .alert-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .alert-table th {
            padding: 12px 10px;
            text-align: left;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }
        .alert-table td {
            padding: 10px;
            color: rgba(255, 255, 255, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .alert-table tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        /* 建筑详情弹窗 - 悬停式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            max-height: 350px;
            background: rgba(15, 20, 30, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            z-index: 100;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(10px);
            transform: translateY(-10px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .modal-overlay.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        .modal-header {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            background: rgba(59, 130, 246, 0.08);
        }
        .modal-header h3 {
            margin: 0;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.95);
        }
        .modal-body {
            padding: 12px 15px;
        }
        .building-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
        }
        .info-row.full-width {
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }
        .info-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }
        .info-value {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
        .info-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
            margin: 0;
            text-align: justify;
        }
        .table-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: rgba(52, 211, 153, 0.1);
            border-radius: 3px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: rgba(52, 211, 153, 0.3);
            border-radius: 3px;
        }
        
        /* 左右侧布局 */
        .side-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .side-panel {
            flex: 1;
        }
        
        @media (max-width: 1400px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .main-content { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .main-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>校园智慧运维可视化大屏</h1>
        <div class="header-info">
            <div class="header-time" id="current-time">--:--:--</div>
            <div class="header-date" id="current-date">----年--月--日</div>
        </div>
    </div>

    <!-- 顶部数据卡片 -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon">⚡</div>
            <div class="stat-title">当日总用电量</div>
            <div class="stat-value" id="stat-electricity">--</div>
            <div class="stat-unit">kWh</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📚</div>
            <div class="stat-title">教室综合使用率</div>
            <div class="stat-value" id="stat-classroom">--</div>
            <div class="stat-unit">%</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🌡️</div>
            <div class="stat-title">校园平均温度</div>
            <div class="stat-value" id="stat-temp">--</div>
            <div class="stat-unit">°C</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💧</div>
            <div class="stat-title">校园平均湿度</div>
            <div class="stat-value" id="stat-humidity">--</div>
            <div class="stat-unit">%</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📡</div>
            <div class="stat-title">正常在线设备</div>
            <div class="stat-value" id="stat-devices">--</div>
            <div class="stat-unit">台</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⚠️</div>
            <div class="stat-title">当日告警数量</div>
            <div class="stat-value" id="stat-alerts">--</div>
            <div class="stat-unit">条</div>
        </div>
    </div>

    <!-- 主内容区域 - 参考图片排版 -->
    <div class="main-content">
        <!-- 顶部行 -->
        <div class="panel top-left">
            <div class="panel-header">
                <span class="panel-title">📈 校园能耗流向分析</span>
            </div>
            <div class="panel-body">
                <div class="chart-container" id="sankey-chart"></div>
            </div>
        </div>
        <div class="panel top-center">
            <div class="panel-header">
                <span class="panel-title">🌿 校园环境质量分析</span>
            </div>
            <div class="panel-body">
                <div class="chart-container" id="radar-chart"></div>
            </div>
        </div>
        <div class="panel top-right">
            <div class="panel-header">
                <span class="panel-title">📊 设备状态统计</span>
            </div>
            <div class="panel-body">
                <div class="chart-container" id="device-pie-chart"></div>
            </div>
        </div>

        <!-- 中间行 -->
        <div class="panel left-column">
            <div class="panel-header">
                <span class="panel-title">🏢 各楼栋活跃度排行</span>
            </div>
            <div class="panel-body">
                <div class="chart-container" id="building-bar-chart"></div>
            </div>
        </div>
        
        <!-- 中央区域 - 透明，完整显示3D沙盘 -->
        <div class="center-area" id="center-area">
            <div class="center-hint">🖱️ 拖拽旋转 | 滚轮缩放</div>
        </div>
        
        <div class="panel right-column">
            <div class="panel-header">
                <span class="panel-title">🔧 校园设备告警清单</span>
            </div>
            <div class="panel-body">
                <div class="table-scroll">
                    <table class="alert-table">
                        <thead>
                            <tr>
                                <th>设备</th>
                                <th>状态</th>
                                <th>说明</th>
                            </tr>
                        </thead>
                        <tbody id="alert-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 底部行 -->
        <div class="panel bottom-left">
            <div class="panel-header">
                <span class="panel-title">🎯 能耗达成率</span>
            </div>
            <div class="panel-body">
                <div class="chart-container" id="liquid-chart"></div>
            </div>
        </div>
        <div class="panel bottom-center">
            <div class="panel-header">
                <span class="panel-title">📊 能耗统计指标</span>
            </div>
            <div class="panel-body">
                <div class="chart-container" id="energy-bar-chart"></div>
            </div>
        </div>
        <div class="panel bottom-right">
            <div class="panel-header">
                <span class="panel-title">🌡️ 实时监测仪表盘</span>
            </div>
            <div class="panel-body">
                <div class="chart-container" id="gauge-chart"></div>
            </div>
        </div>
    </div>

    <!-- 3D模型容器 - 全屏背景 -->
    <div id="model-container">
        <canvas id="model-canvas"></canvas>
    </div>

    <!-- 建筑详情弹窗 -->
    <div id="building-modal" class="modal-overlay">
        <div class="modal-header">
            <h3 id="modal-title"> 建筑详情</h3>
        </div>
        <div class="modal-body">
            <div class="building-info">
                <div class="info-row">
                    <span class="info-label">建筑名称</span>
                    <span class="info-value" id="building-name">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">建筑类型</span>
                    <span class="info-value" id="building-type">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">建筑面积</span>
                    <span class="info-value" id="building-area">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">楼层数</span>
                    <span class="info-value" id="building-floors">-</span>
                </div>
                <div class="info-row full-width">
                    <span class="info-label">介绍</span>
                    <p class="info-desc" id="building-desc">-</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fetchData(url, callback) {
            fetch(url).then(r => r.json()).then(callback).catch(e => console.error('Error:', e));
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN');
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', {year: 'numeric', month: 'long', day: 'numeric'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 初始化总览数据
        function initOverview() {
            Promise.all([
                fetchData('/api/energy_stat_data?period=day'),
                fetchData('/api/classroom_usage'),
                fetchData('/api/env_realtime_data'),
                fetchData('/api/device_status_overview'),
                fetchData('/api/alarm_list')
            ]).then(([energyData, classroomData, envData, deviceData, alarmData]) => {
                // 总用电量
                document.getElementById('stat-electricity').textContent = energyData.total_electric.toFixed(0);
                // 教室综合使用率
                document.getElementById('stat-classroom').textContent = classroomData.avg_usage_rate.toFixed(1);
                // 校园平均温度
                document.getElementById('stat-temp').textContent = envData.avg_temperature.toFixed(1);
                // 校园平均湿度
                document.getElementById('stat-humidity').textContent = envData.avg_humidity.toFixed(1);
                // 正常在线设备
                document.getElementById('stat-devices').textContent = deviceData.online_devices;
                // 当日告警数量
                document.getElementById('stat-alerts').textContent = alarmData.today_count;
            }).catch(e => console.error('Error:', e));
        }

        // 桑基图 - 校园能耗流向分析
        function initSankeyChart() {
            const chart = echarts.init(document.getElementById('sankey-chart'));
            const data = {
                nodes: [
                    { name: '总能耗' },
                    { name: '教学楼' },
                    { name: '宿舍楼' },
                    { name: '图书馆' },
                    { name: '体育馆' },
                    { name: '设备用电' },
                    { name: '照明用电' },
                    { name: '空调用电' },
                    { name: '其他用电' }
                ],
                links: [
                    { source: '总能耗', target: '教学楼', value: 3500 },
                    { source: '总能耗', target: '宿舍楼', value: 5000 },
                    { source: '总能耗', target: '图书馆', value: 1500 },
                    { source: '总能耗', target: '体育馆', value: 800 },
                    { source: '教学楼', target: '设备用电', value: 1500 },
                    { source: '教学楼', target: '照明用电', value: 1000 },
                    { source: '教学楼', target: '空调用电', value: 800 },
                    { source: '教学楼', target: '其他用电', value: 200 },
                    { source: '宿舍楼', target: '设备用电', value: 800 },
                    { source: '宿舍楼', target: '照明用电', value: 1200 },
                    { source: '宿舍楼', target: '空调用电', value: 2500 },
                    { source: '宿舍楼', target: '其他用电', value: 500 },
                    { source: '图书馆', target: '设备用电', value: 400 },
                    { source: '图书馆', target: '照明用电', value: 600 },
                    { source: '图书馆', target: '空调用电', value: 400 },
                    { source: '体育馆', target: '设备用电', value: 300 },
                    { source: '体育馆', target: '照明用电', value: 200 },
                    { source: '体育馆', target: '空调用电', value: 250 },
                    { source: '体育馆', target: '其他用电', value: 50 }
                ]
            };
            
            chart.setOption({
                tooltip: { trigger: 'item', triggerOn: 'mousemove' },
                series: [{
                    type: 'sankey',
                    layout: 'none',
                    emphasis: { focus: 'adjacency' },
                    nodeAlign: 'justify',
                    nodeGap: 10,
                    nodeWidth: 20,
                    layoutIterations: 0,
                    data: data.nodes.map(node => ({ name: node.name })),
                    links: data.links,
                    lineStyle: {
                        color: 'gradient',
                        curveness: 0.5
                    },
                    label: {
                        show: true,
                        fontSize: 11,
                        color: '#fff'
                    }
                }]
            });
            window.addEventListener('resize', () => chart.resize());
        }

        // 雷达图 - 校园环境质量分析
        function initRadarChart() {
            fetchData('/api/env_radar_analysis', (data) => {
                const chart = echarts.init(document.getElementById('radar-chart'));
                chart.setOption({
                    tooltip: { trigger: 'item' },
                    legend: { show: false },
                    radar: {
                        indicator: data.dimensions.map((dim, i) => ({
                            name: dim,
                            max: dim === '温度' ? 40 : dim === '湿度' ? 100 : 
                                  dim === 'PM2.5' ? 50 : dim === 'PM10' ? 100 :
                                  dim === 'CO₂' ? 2000 : 100
                        })),
                        center: ['50%', '50%'],
                        radius: '60%',
                        splitNumber: 4,
                        axisName: { color: '#999', fontSize: 11 },
                        splitArea: { areaStyle: { color: ['rgba(59, 130, 246, 0.05)', 'rgba(59, 130, 246, 0.1)'] } },
                        axisLine: { lineStyle: { color: 'rgba(59, 130, 246, 0.3)' } },
                        splitLine: { lineStyle: { color: 'rgba(59, 130, 246, 0.2)' } }
                    },
                    series: [{
                        type: 'radar',
                        data: [{

                }
            };
            
            // 可交互建筑名称列表
            const interactiveBuildings = [
                '博文楼', '博远楼', '腾踏学生公寓', '汇华学生公寓', 
                '弘毅学生公寓', '景新学生公寓', '景明学生公寓', '博雅学生公寓',
                '明德楼', '图书馆', '学生活动中心', '工程实训楼', 
                '任美福楼', '工学楼', '生科楼', '体育馆', '文鼎楼'
            ];
            
            loader.load(
                '/campus-model-2?v=' + Date.now(),
                (gltf) => {
                    const model = gltf.scene;
                    
                    // 自动调整模型大小和位置
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 3 / maxDim;
                    model.scale.setScalar(scale);
                    
                    model.position.x = -center.x * scale;
                    model.position.y = -center.y * scale + 0.5;
                    model.position.z = -center.z * scale;
                    
                    // 收集建筑物mesh并设置可点击（仅指定建筑）
                    model.traverse((child) => {
                        if (child.isMesh) {
                            // 打印所有mesh名称，方便调试
                            console.log('发现mesh:', child.name);
                            
                            const meshName = child.name.toLowerCase();
                            let matchedBuilding = null;
                            
                            // 检查是否匹配可交互建筑列表
                            for (const buildingName of interactiveBuildings) {
                                const lowerBuildingName = buildingName.toLowerCase();
                                if (meshName.includes(lowerBuildingName) || 
                                    lowerBuildingName.includes(meshName)) {
                                    matchedBuilding = buildingName;
                                    break;
                                }
                            }
                            
                            if (matchedBuilding) {
                                child.userData.buildingName = matchedBuilding;
                                buildingMeshes.push(child);
                                
                                // 缓存原始材质
                                originalMaterials[child.uuid] = {
                                    material: child.material.clone ? child.material.clone() : child.material,
                                    visible: child.visible
                                };
                                
                                // 开启阴影
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        }
                    });
                    
                    scene.add(model);
                    document.getElementById('loading').style.display = 'none';
                    console.log('模型加载成功，找到', buildingMeshes.length, '栋可交互建筑');
                },
                (progress) => {
                    console.log('加载进度:', (progress.loaded / progress.total * 100) + '%');
                },
                (error) => {
                    console.error('模型加载错误:', error);
                    document.getElementById('loading').querySelector('.loading-text').textContent = '模型加载失败';
                }
            );
            
            // 射线检测器
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let hoveredMesh = null;
            let isModalVisible = false;
            
            // 点击事件处理 - 点击交互
            centerArea.addEventListener('click', (event) => {
                // 计算鼠标在归一化设备坐标中的位置
                const rect = centerArea.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                // 更新射线
                raycaster.setFromCamera(mouse, camera);
                
                // 检测与建筑物的交点
                const intersects = raycaster.intersectObjects(buildingMeshes);
                
                if (intersects.length > 0) {
                    const clickedMesh = intersects[0].object;
                    
                    // 如果点击的是另一栋建筑，先恢复之前的
                    if (hoveredMesh && hoveredMesh !== clickedMesh) {
                        restoreMaterial(hoveredMesh);
                    }
                    
                    // 高亮并显示详情
                    hoveredMesh = clickedMesh;
                    highlightBuilding(hoveredMesh);
                    showBuildingInfo(hoveredMesh.userData.buildingName);
                    updateModalPosition(event);
                    isModalVisible = true;
                } else {
                    // 点击空白处，恢复并隐藏
                    if (hoveredMesh) {
                        restoreMaterial(hoveredMesh);
                        hoveredMesh = null;
                    }
                    hideModal();
                    isModalVisible = false;
                }
            });
            
            // 点击空白处隐藏弹窗
            centerArea.addEventListener('mousemove', (event) => {
                if (isModalVisible && !hoveredMesh) {
                    // 检查是否在弹窗内
                    const modal = document.getElementById('building-modal');
                    const rect = modal.getBoundingClientRect();
                    if (event.clientX < rect.left || event.clientX > rect.right ||
                        event.clientY < rect.top || event.clientY > rect.bottom) {
                        // 鼠标不在弹窗内，隐藏
                        hideModal();
                        isModalVisible = false;
                    }
                }
            });
            
            // 更新弹窗位置
            function updateModalPosition(event) {
                const modal = document.getElementById('building-modal');
                const padding = 15;
                
                let left = event.clientX + padding;
                let top = event.clientY + padding;
                
                // 确保弹窗不超出屏幕
                if (left + 280 > window.innerWidth) {
                    left = event.clientX - 280 - padding;
                }
                if (top + 350 > window.innerHeight) {
                    top = event.clientY - 350 - padding;
                }
                
                modal.style.left = left + 'px';
                modal.style.top = top + 'px';
            }
            
            // 高亮建筑 - 蓝色发光
            function highlightBuilding(mesh) {
                if (originalMaterials[mesh.uuid]) {
                    const origMat = originalMaterials[mesh.uuid].material;
                    let newMaterial;
                    
                    if (origMat.clone) {
                        newMaterial = origMat.clone();
                    } else {
                        newMaterial = new THREE.MeshStandardMaterial({
                            color: origMat.color || 0xffffff,
                            emissive: new THREE.Color(0x3b82f6),
                            emissiveIntensity: 0.6,
                            transparent: true,
                            opacity: 0.95
                        });
                    }
                    
                    if (newMaterial.emissive !== undefined) {
                        newMaterial.emissive = new THREE.Color(0x3b82f6);
                        newMaterial.emissiveIntensity = 0.6;
                    }
                    newMaterial.transparent = true;
                    newMaterial.opacity = 0.95;
                    
                    mesh.material = newMaterial;
                }
            }
            
            // 恢复材质
            function restoreMaterial(mesh) {
                if (originalMaterials[mesh.uuid]) {
                    const origMat = originalMaterials[mesh.uuid].material;
                    if (origMat.clone) {
                        mesh.material = origMat.clone();
                    } else {
                        mesh.material = origMat;
                    }
                    mesh.visible = originalMaterials[mesh.uuid].visible;
                }
            }
            
            // 显示建筑详情
            function showBuildingInfo(buildingName) {
                const data = buildingData[buildingName];
                if (data) {
                    document.getElementById('building-name').textContent = data.name;
                    document.getElementById('building-type').textContent = data.type;
                    document.getElementById('building-area').textContent = data.area;
                    document.getElementById('building-floors').textContent = data.floors;
                    document.getElementById('building-desc').textContent = data.desc;
                } else {
                    document.getElementById('building-name').textContent = buildingName;
                    document.getElementById('building-type').textContent = '校园建筑';
                    document.getElementById('building-area').textContent = '待统计';
                    document.getElementById('building-floors').textContent = '待统计';
                    document.getElementById('building-desc').textContent = '该建筑详细信息正在完善中。';
                }
                document.getElementById('building-modal').classList.add('show');
            }
            
            // 隐藏弹窗
            function hideModal() {
                document.getElementById('building-modal').classList.remove('show');
            }
            
            // 动画循环
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
            
            // 窗口大小调整
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 先初始化所有图表
            initOverview();
            initSankeyChart();
            initRadarChart();
            initDevicePieChart();
            initBuildingBarChart();
            initAlertTable();
            initLiquidChart();
            initEnergyBarChart();
            initGaugeChart();
            
            // 3D模型异步加载，失败不影响其他功能
            init3DModel().catch(e => {
                console.error('3D模型加载失败:', e);
                document.getElementById('model-container').style.display = 'none';
            });
            
            // 每30秒刷新数据
            setInterval(() => {
                initOverview();
                initAlertTable();
                initGaugeChart();
            }, 30000);
        });
    </script>
</body>
</html>
